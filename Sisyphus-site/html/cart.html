<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Carrinho de Compras - Sisyphus</title>
    <link rel="stylesheet" href="imagens/css/cart.css">
</head>
<body>

    <header>
        <button onclick="history.back()">Voltar</button>
        <h1>Sisyphus</h1>
        <h2>Carrinho de Compras</h2>
    </header>

    <main class="container-carrinho">
        <div class="carrinho-item">
            <img src="imagens/blusa harry potter.png" alt="Camiseta Harry Potter">
            <div class="detalhes-item">
                <h3>Camiseta Geek</h3>
                <p>Quantidade: 2</p>
                <p class="preco">R$ 89,90</p>
            </div>
        </div>

        <div class="carrinho-item">
            <img src="imagens/caneca do senhor dos aneis.png" alt="Caneca Senhor dos Anéis">
            <div class="detalhes-item">
                <h3>Caneca Nerd</h3>
                <p>Quantidade: 1</p>
                <p class="preco">R$ 59,90</p>
            </div>
        </div>

        <div class="carrinho-resumo">
            <h2>Total: R$ 239,70</h2>
            <button class="btn-finalizar">Finalizar Compra</button>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 Sisyphus. Todos os direitos reservados.</p>
    </footer>

</body>
</html>
